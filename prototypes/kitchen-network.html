<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HelloCreators Beta — Become a founding creator</title>
    <style>
/* =========================================================
   HelloFresh HelloCreators Beta — Creators Landing
   ========================================================= */

@font-face {
  font-family: 'Agrandir';
  src: url('kitchen-network-assets/fonts/Agrandir-TightBlack.ttf') format('truetype');
  font-weight: 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Agrandir';
  src: url('kitchen-network-assets/fonts/Agrandir-Bold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --hf-lime-500: #76B82A;
  --hf-lime-400: #9FD658;
  --hf-lime-300: #C6E89A;
  --hf-lime-200: #DAF0B6;
  --hf-lime-100: #EAF6D6;

  --cb-green-900: #004D30;
  --cb-green-800: #006039;
  --cb-green-700: #006E46;
  --cb-green-600: #127A52;
  --cb-green-500: #2E8C66;
  --cb-green-200: #B8D8C7;
  --cb-green-100: #DCEAE0;
  --cb-green-50:  #EEF5F0;

  --cream-100: #FAF6EB;
  --cream-200: #F4EEDE;
  --cream-300: #EDE4CC;
  --cream-400: #E3D6B4;
  --cream: #F4EEDE;

  --ink-900: #111111;
  --ink-800: #1F1F1F;
  --ink-700: #333333;
  --ink-500: #6B6B6B;
  --ink-400: #9A9A9A;
  --ink-300: #CFCFCF;
  --ink-200: #E7E7E7;
  --ink-100: #F2F2F2;
  --white: #FFFFFF;

  --ig-start: #F58529;
  --ig-mid: #DD2A7B;
  --ig-end: #8134AF;
  --tiktok-pink: #FE2C55;
  --tiktok-cyan: #25F4EE;
  --youtube-red: #FF0000;
  --facebook: #1877F2;

  --danger: #D84141;
  --warning: #F2A93B;

  --font-display: 'Agrandir', 'Archivo', system-ui, sans-serif;
  --font-body: 'Archivo', 'Agrandir', system-ui, sans-serif;
  --font-mono: 'Space Grotesk', ui-monospace, Menlo, monospace;

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-xl: 32px;
  --radius-pill: 999px;

  --shadow-xs: 0 1px 2px rgba(20,20,20,0.06);
  --shadow-sm: 0 2px 8px rgba(20,20,20,0.06);
  --shadow-md: 0 8px 24px rgba(20,20,20,0.08);
  --shadow-lg: 0 18px 40px rgba(20,20,20,0.10);
  --shadow-cta: 0 4px 0 rgba(0,0,0,0.12);

  --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur-base: 220ms;
  --dur-slow: 420ms;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--cream-200);
  color: var(--ink-900);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
}

img { display: block; max-width: 100%; }

a { color: inherit; text-decoration: none; }

/* ===== Type primitives ===== */
.display {
  font-family: var(--font-display);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.035em;
  text-wrap: balance;
}
.heavy { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.02em; }
.bold  { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em; }

.eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cb-green-700);
}

.hl-green { color: var(--cb-green-700); }
.hl-lime  { color: var(--hf-lime-500); }

/* ===== Layout ===== */
.container {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 32px;
}
@media (max-width: 720px) {
  .container { padding: 0 20px; }
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 28px;
  border: 0;
  border-radius: var(--radius-pill);
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform var(--dur-fast) var(--ease-out),
              background var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out);
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.btn:active { transform: scale(0.97); }

.btn-ink { background: var(--ink-900); color: var(--white); }
.btn-ink:hover { background: var(--ink-700); }

.btn-green { background: var(--cb-green-700); color: var(--white); }
.btn-green:hover { background: var(--cb-green-800); }

.btn-lime { background: var(--hf-lime-500); color: var(--ink-900); box-shadow: var(--shadow-cta); }
.btn-lime:hover { background: var(--hf-lime-400); }

.btn-ghost {
  background: transparent;
  color: var(--ink-900);
  box-shadow: inset 0 0 0 2px var(--ink-900);
}
.btn-ghost:hover { background: var(--ink-900); color: var(--white); }

.btn-lg { padding: 20px 36px; font-size: 18px; }
.btn-sm { padding: 10px 18px; font-size: 14px; }

/* ===== Chip ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
}

/* ===== Nav ===== */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--cream-200);
  transition: background var(--dur-base) var(--ease-out),
              box-shadow var(--dur-base) var(--ease-out),
              border-color var(--dur-base) var(--ease-out);
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(244, 238, 222, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom-color: rgba(17,17,17,0.08);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 76px;
  gap: 24px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.nav-logo { height: 26px; }
.nav-divider {
  width: 1px;
  height: 22px;
  background: var(--ink-300);
}
.nav-product {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.01em;
}
.nav-product .kn-dot {
  display: inline-block;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--cb-green-700);
  margin-right: 8px;
  vertical-align: 2px;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
}
.nav-link {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink-700);
  transition: color var(--dur-fast);
}
.nav-link:hover { color: var(--ink-900); }
.nav-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.nav-counter {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: var(--ink-900);
  color: var(--white);
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-family: var(--font-display);
  font-weight: 700;
}
.nav-counter .pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--hf-lime-400);
  box-shadow: 0 0 0 0 rgba(159, 214, 88, 0.7);
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(159, 214, 88, 0.7); }
  70% { box-shadow: 0 0 0 8px rgba(159, 214, 88, 0); }
  100% { box-shadow: 0 0 0 0 rgba(159, 214, 88, 0); }
}
@media (max-width: 920px) {
  .nav-links { display: none; }
  .nav-counter span.long { display: none; }
}
@media (max-width: 560px) {
  .nav-brand .nav-divider, .nav-brand .nav-product { display: none; }
}

/* ===== HERO ===== */
.hero {
  position: relative;
  padding: 56px 0 80px;
  overflow: hidden;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  gap: 64px;
  align-items: center;
}
@media (max-width: 980px) {
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
}

.hero-eyebrow-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}
.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  background: var(--cb-green-700);
  color: var(--white);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hero-tag .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--hf-lime-400);
}

.hero-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(48px, 7.5vw, 104px);
  line-height: 0.92;
  letter-spacing: -0.04em;
  margin: 0 0 28px;
  text-wrap: balance;
}
.hero-title .line2 {
  display: block;
  color: var(--cb-green-700);
}
.hero-sub {
  font-size: 19px;
  line-height: 1.5;
  color: var(--ink-700);
  max-width: 540px;
  margin: 0 0 36px;
}
.hero-cta-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.hero-proof {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 36px;
  color: var(--ink-700);
  font-size: 14px;
}
.hero-avatars {
  display: flex;
}
.hero-avatars .av {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--cream-200);
  background-size: cover;
  background-position: center;
  margin-left: -10px;
}
.hero-avatars .av:first-child { margin-left: 0; }

/* Hero collage */
.hero-collage {
  position: relative;
  height: 620px;
}
@media (max-width: 980px) {
  .hero-collage { height: 520px; max-width: 520px; margin: 0 auto; }
}
.collage-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 60% 40%, var(--cream-300) 0%, transparent 60%);
}
.collage-plate {
  position: absolute;
  width: 78%;
  aspect-ratio: 1 / 1;
  right: -4%;
  top: 8%;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.collage-plate img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.collage-phone {
  position: absolute;
  width: 44%;
  aspect-ratio: 9 / 19.5;
  left: 0;
  bottom: 0;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  transform: rotate(-6deg);
  background: var(--ink-900);
  border: 8px solid var(--ink-900);
}
.collage-phone img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 18px;
}
.collage-badge {
  position: absolute;
  bottom: 60px;
  right: 4%;
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  gap: 14px;
  transform: rotate(4deg);
  z-index: 2;
}
.collage-badge .num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: var(--cb-green-700);
  letter-spacing: -0.03em;
}
.collage-badge .lbl {
  font-size: 12px;
  color: var(--ink-700);
  line-height: 1.3;
}
.collage-social {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 18px;
  box-shadow: var(--shadow-md);
  overflow: hidden;
  z-index: 3;
}
.collage-social img { width: 100%; height: 100%; object-fit: cover; display: block; }
.collage-social.s1 { top: 4%; left: 38%; transform: rotate(-12deg); }
.collage-social.s2 { top: 26%; left: 4%; transform: rotate(8deg); }
.collage-social.s3 { bottom: 22%; right: 22%; transform: rotate(-6deg); }

/* ===== Bridge bar: socials -> HF community ===== */
.platform-bar {
  border-top: 1px solid rgba(17,17,17,0.08);
  border-bottom: 1px solid rgba(17,17,17,0.08);
  padding: 36px 0;
  background: var(--cream-100);
}
.bridge {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 40px;
}
@media (max-width: 920px) {
  .bridge { grid-template-columns: 1fr; gap: 24px; text-align: center; }
}
.bridge-side {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.bridge-side.left { align-items: flex-start; }
.bridge-side.right { align-items: flex-end; text-align: right; }
@media (max-width: 920px) {
  .bridge-side.left, .bridge-side.right { align-items: center; text-align: center; }
}

.bridge-eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-500);
}
.bridge-icons {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.bridge-icon {
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--dur-fast) var(--ease-out);
}
.bridge-icon:hover { transform: translateY(-2px); }
.bridge-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 14px;
  box-shadow: var(--shadow-xs);
}

.bridge-arrow {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--cb-green-700);
}
.bridge-arrow svg { display: block; }
@media (max-width: 920px) {
  .bridge-arrow { transform: rotate(90deg); }
}

.bridge-stat {
  display: flex;
  align-items: center;
  gap: 14px;
}
.bridge-stat-num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(36px, 4.6vw, 56px);
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--cb-green-700);
}
.bridge-stat-lbl {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.005em;
  color: var(--ink-900);
  line-height: 1.25;
  text-align: left;
}
.bridge-stat-lbl .sub {
  display: block;
  font-weight: 500;
  font-size: 12px;
  color: var(--ink-500);
  letter-spacing: 0;
  margin-top: 2px;
}
.bridge-meta {
  font-size: 13px;
  color: var(--ink-500);
}

/* ===== Founding band (dark green) ===== */
.founding {
  background: var(--cb-green-900);
  color: var(--white);
  padding: 96px 0 104px;
  position: relative;
  overflow: hidden;
}
.founding::before {
  content: "";
  position: absolute;
  width: 480px;
  height: 480px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(118,184,42,0.18) 0%, transparent 70%);
  top: -200px;
  right: -100px;
  pointer-events: none;
}
.founding-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 72px;
  align-items: center;
  position: relative;
}
@media (max-width: 980px) {
  .founding-grid { grid-template-columns: 1fr; gap: 48px; }
}
.founding .eyebrow { color: var(--hf-lime-400); }
.founding h2 {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(40px, 5.4vw, 72px);
  line-height: 0.96;
  letter-spacing: -0.03em;
  margin: 12px 0 24px;
  text-wrap: balance;
}
.founding h2 .em { color: var(--hf-lime-400); }
.founding .lede {
  font-size: 19px;
  line-height: 1.55;
  color: rgba(255,255,255,0.82);
  max-width: 560px;
  margin-bottom: 36px;
}
.founding-perks {
  display: grid;
  gap: 18px;
}
.founding-perk {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.founding-perk-icon {
  flex: 0 0 auto;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--hf-lime-500);
  color: var(--cb-green-900);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 17px;
}
.founding-perk h4 {
  margin: 0 0 4px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.founding-perk p {
  margin: 0;
  color: rgba(255,255,255,0.72);
  font-size: 15px;
  line-height: 1.55;
}

/* Counter card */
.counter-card {
  background: var(--white);
  color: var(--ink-900);
  border-radius: var(--radius-lg);
  padding: 36px;
  box-shadow: var(--shadow-lg);
  position: relative;
}
.counter-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
}
.counter-eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cb-green-700);
}
.counter-deadline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--cream-200);
  padding: 8px 14px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 600;
}
.counter-deadline .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--danger);
}
.counter-num-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 8px;
}
.counter-num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 96px;
  line-height: 0.9;
  letter-spacing: -0.05em;
  color: var(--cb-green-700);
}
.counter-of {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 36px;
  letter-spacing: -0.03em;
  color: var(--ink-300);
}
.counter-label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
}
.counter-bar {
  height: 12px;
  border-radius: var(--radius-pill);
  background: var(--cream-300);
  overflow: hidden;
  margin-bottom: 24px;
}
.counter-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cb-green-700) 0%, var(--hf-lime-500) 100%);
  border-radius: var(--radius-pill);
  transition: width 1.4s var(--ease-out);
}
.counter-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  color: var(--ink-700);
}
.counter-meta strong { color: var(--ink-900); font-weight: 700; }
.counter-recent {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--ink-200);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--ink-700);
}
.counter-recent .av {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
}

/* ===== Section heads ===== */
.section { padding: 112px 0; }
.section-head { max-width: 760px; margin: 0 auto 64px; text-align: center; }
.section-head .eyebrow { margin-bottom: 14px; }
.section-head h2 {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(36px, 4.4vw, 60px);
  line-height: 1;
  letter-spacing: -0.03em;
  margin: 0 0 16px;
  text-wrap: balance;
}
.section-head p {
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-700);
  margin: 0;
  text-wrap: pretty;
}

/* ===== How it works ===== */
.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
@media (max-width: 980px) { .steps { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .steps { grid-template-columns: 1fr; } }

.step {
  position: relative;
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px 28px;
